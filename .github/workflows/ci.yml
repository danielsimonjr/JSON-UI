name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type Check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Build first: the headless/react workspace packages import the built
        # @json-ui/core (its types live in dist/index.d.ts via tsup). typecheck
        # and tests fail with "Cannot find module '@json-ui/core'" otherwise.
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test
